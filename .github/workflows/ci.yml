name: Github Actions Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup .Net
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '10.0.x'
            
            - name: Restore dependencies
              run: dotnet restore Bigbazzar.slnx
            
            - name: Build
              run: dotnet build Bigbazzar.slnx --configuration Release --no-restore

            - name: Test
              run: dotnet test Bigbazzar.slnx --no-build --verbosity normal
            
            - name: Upload Test Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: test-results
                path: '**/TestResults/*.trx'